version: "3"
services:
  labelme:
    image: wkentaro/labelme
    environment:
      - DISPLAY=unix$DISPLAY
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - /home/zis/.Xauthority:/root/.Xauthority
      - ./mestrado:/home/developer
    network_mode: host
    privileged: true
    devices:
      - /dev/dri
    command: labelme /home/developer/data_annotated/ --labels home/developer/labels.txt
#python3 ./labelme2mestrado.py data_annotated result2 --labels labels.txt
